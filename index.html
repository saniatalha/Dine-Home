<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dine Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>

<div class="container-fluid p-0">

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <img src="images/logo1.png" alt="Dine@Home">
        </div>
       <nav class="navbar bg-body-tertiary ">
        <form class="container-fluid d-flex justify-content-start">
             <div class="input-group" style="width:300px;">
      <input type="text" class="form-control" placeholder="11 Artillery Row,London" aria-describedby="basic-addon1"/>
      <span class="input-group-text" id="basic-addon1"> <i class="fa-solid fa-location-dot"></i></span>
     </div>
    </form>
    </nav>

        <div class="header-item">
            <a href="userpage.html"> <img src="images/profile.png" alt="Profile"> </a>
        </div>
        </div>

    </header>

    
    <!-- CUISINE TITLE -->
    <nav class="navbar bg-body-tertiary">
        <form class="container-fluid">
             <div class="input-group">
      <input type="text" class="form-control" placeholder="WHAT ARE YOU CRAVING?" aria-label="Username" aria-describedby="basic-addon1"/>
      <span class="input-group-text" id="basic-addon1"> <i class="fa-solid fa-magnifying-glass"></i></span>
    </div>
  </form>
</nav>
      

    <!-- TOP PURPLE BAR -->
    <div class="purple-bar"></div>

    <!-- BLUE BANNER --> 
    <div class="blue-banner">
        So many different kinds to choose from!
    </div>

    <!-- CUISINE GRID -->
    <div class="cuisine-grid">
        <div class="cuisine-card"><img src="images/italian.jpg"><span>Italian</span></div>
        <div class="cuisine-card"><img src="images/indian.jpg"><span>Indian</span></div>
        <div class="cuisine-card"><img src="images/american.jpg"><span>American</span></div>
        <div class="cuisine-card"><img src="images/chinese.jpg"><span>Chinese</span></div>
        <div class="cuisine-card"><img src="images/mexican.jpg"><span>Mexican</span></div>
        <div class="cuisine-card"><img src="images/thai.jpg"><span>Thai</span></div>
        <div class="cuisine-card"><img src="images/Korean.jpg"><span>Korean</span></div>
        <div class="cuisine-card"><img src="images/Indonesian.jpg"><span>Indonesian></span></div>
        <div class="cuisine-card"><img src="images/french.jpg"><span>French</span></div>
        <div class="cuisine-card"><img src="images/greek.jpg"><span>Greek</span></div>
        <div class="cuisine-card"><img src="images/turkish.jpg"><span>Turkish</span></div>
        <div class="cuisine-card"><img src="images/japanese.jpg"><span>Japanese</span></div>

    </div>

    <!-- FAVORITE BANNER -->
    <div class="blue-banner italic">
        Which is your favorite cuisine?
    </div>

    <div class="purple-bar"></div>

    <!-- DEALS -->
    <h3 class="section-title">FIND YOUR FAVOURITE MEAL DEAL....!</h3>

    <div class="deals">
        <img src="images/deal1.jpg">
        <img src="images/deal2.jpg">
        <img src="images/deal3.jpg">
    </div>

    <!-- RESTAURANTS -->
    <h3 class="section-title">CHOOSE YOUR FAVOURITE FOOD SPOT...!</h3>

    <div class="restaurants">
        <img src="images/rest1.jpg">
        <img src="images/rest2.jpg">
        <img src="images/rest3.jpg">
        <img src="images/rest4.jpg">
      

    </div>

</div>
